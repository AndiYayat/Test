<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЁЯО░ Demo Slot тАФ Edukasi</title>
    <style>
        /* ----- GLOBAL RESET & FONT ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ----- MAIN CARD ----- */
        .slot-card {
            background: #222a3f;
            padding: 30px 40px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .slot-card h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f0e9d0;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .slot-card .sub {
            color: #8892b0;
            font-size: 13px;
            margin-bottom: 20px;
            border-bottom: 1px solid #2f3a55;
            padding-bottom: 16px;
        }

        /* ----- SALDO & BET ----- */
        .balance-area {
            display: flex;
            justify-content: space-between;
            background: #141b2b;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 18px;
            color: #ccd6f6;
            font-weight: 500;
            font-size: 15px;
            border: 1px solid #2d3a5a;
        }

        .balance-area span:last-child {
            color: #f5c842;
            font-weight: 700;
        }

        /* ----- REEL ----- */
        .reel-container {
            background: #0e1322;
            border-radius: 30px;
            padding: 30px 20px;
            margin: 10px 0 22px;
            border: 1px solid #2d3a5a;
            box-shadow: inset 0 8px 12px rgba(0, 0, 0, 0.6);
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-size: 68px;
            line-height: 1.3;
            min-height: 100px;
            align-items: center;
        }

        .reel {
            background: #1b2338;
            padding: 6px 16px;
            border-radius: 20px;
            box-shadow: 0 0 0 2px #2e3b5e, inset 0 0 10px #00000088;
            transition: transform 0.15s ease;
            width: 90px;
            text-align: center;
        }

        .reel.spinning {
            animation: spin-flicker 0.3s infinite alternate;
        }

        @keyframes spin-flicker {
            0% { transform: rotate(2deg) scale(1.02); }
            100% { transform: rotate(-2deg) scale(0.98); }
        }

        /* ----- HASIL WIN/LOSE ----- */
        .result-box {
            margin: 8px 0 18px;
            font-size: 22px;
            font-weight: 700;
            min-height: 40px;
        }

        .result-box.win {
            color: #f5c842;
            text-shadow: 0 0 20px #f5c84266;
        }

        .result-box.lose {
            color: #6b7a9a;
        }

        /* ----- BET INPUT & SPIN BUTTON ----- */
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin: 16px 0 10px;
        }

        .controls label {
            color: #a8b2d1;
            font-size: 14px;
            font-weight: 500;
        }

        .controls input[type="number"] {
            background: #101724;
            border: 1px solid #2d3a5a;
            border-radius: 40px;
            padding: 10px 16px;
            width: 120px;
            font-size: 16px;
            color: #ffffff;
            text-align: center;
            outline: none;
            transition: border 0.2s;
        }

        .controls input[type="number"]:focus {
            border-color: #f5c842;
        }

        .btn-spin {
            background: linear-gradient(145deg, #f5c842, #dba62b);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            color: #0b0e1a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #8f6e1e, 0 8px 20px #f5c84233;
            letter-spacing: 1px;
        }

        .btn-spin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #8f6e1e, 0 12px 30px #f5c84255;
        }

        .btn-spin:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8f6e1e;
        }

        .btn-spin:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8f6e1e;
            cursor: not-allowed;
        }

        /* ----- HISTORY ----- */
        .history {
            margin-top: 24px;
            border-top: 1px solid #2f3a55;
            padding-top: 18px;
            max-height: 140px;
            overflow-y: auto;
            text-align: left;
        }

        .history p {
            color: #8892b0;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid #1f283e;
            display: flex;
            justify-content: space-between;
        }

        .history .win-text {
            color: #f5c842;
        }

        .history .lose-text {
            color: #6b7a9a;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: #4a5670;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="slot-card">
    <h1>ЁЯО░ SLOT DEMO</h1>
    <div class="sub">тЪб Edukasi тАФ Tanpa Uang Asli тЪб</div>

    <!-- Balance -->
    <div class="balance-area">
        <span>ЁЯТ░ Saldo</span>
        <span id="balanceDisplay">Rp 100.000</span>
    </div>

    <!-- Reel -->
    <div class="reel-container">
        <div class="reels" id="reelsContainer">
            <div class="reel" id="reel1">ЁЯНТ</div>
            <div class="reel" id="reel2">ЁЯНЛ</div>
            <div class="reel" id="reel3">ЁЯНК</div>
        </div>
    </div>

    <!-- Result -->
    <div class="result-box" id="resultBox">ЁЯО▓ Putar untuk mulai</div>

    <!-- Controls -->
    <div class="controls">
        <label for="betInput">Taruhan</label>
        <input type="number" id="betInput" value="1000" min="100" step="100" />
        <button class="btn-spin" id="spinBtn">ЁЯФД SPIN</button>
    </div>

    <!-- History -->
    <div class="history" id="historyLog">
        <p style="color:#4a5670; text-align:center; font-style:italic;">Riwayat permainan akan muncul di sini</p>
    </div>

    <div class="footer-note">
        тЪая╕П Hanya simulasi frontend тАФ semua angka fiktif
    </div>
</div>

<script>
    (function() {
        // ----- STATE -----
        let balance = 100000;
        let history = [];

        // DOM refs
        const balanceDisplay = document.getElementById('balanceDisplay');
        const reel1 = document.getElementById('reel1');
        const reel2 = document.getElementById('reel2');
        const reel3 = document.getElementById('reel3');
        const resultBox = document.getElementById('resultBox');
        const spinBtn = document.getElementById('spinBtn');
        const betInput = document.getElementById('betInput');
        const historyLog = document.getElementById('historyLog');

        // Symbols array
        const symbols = ['ЁЯНТ', 'ЁЯНЛ', 'ЁЯНК', 'ЁЯНЗ', 'ЁЯФФ', 'тнР', '7я╕ПтГг'];

        // ----- HELPER: update UI balance -----
        function updateBalanceUI() {
            balanceDisplay.textContent = 'Rp ' + balance.toLocaleString('id-ID');
        }

        // ----- HELPER: add history entry -----
        function addHistory(entry) {
            history.unshift(entry);
            if (history.length > 15) history.pop();

            // render history
            historyLog.innerHTML = '';
            if (history.length === 0) {
                historyLog.innerHTML = '<p style="color:#4a5670; text-align:center; font-style:italic;">Riwayat permainan akan muncul di sini</p>';
                return;
            }
            history.forEach(item => {
                const p = document.createElement('p');
                const statusClass = item.win > 0 ? 'win-text' : 'lose-text';
                const label = item.win > 0 ? 'ЁЯОЙ MENANG' : 'ЁЯШЮ KALAH';
                p.innerHTML = `
                    <span>${item.symbols} тАФ ${label}</span>
                    <span class="${statusClass}">${item.win > 0 ? '+Rp ' + item.win.toLocaleString('id-ID') : '-Rp ' + item.bet.toLocaleString('id-ID')}</span>
                `;
                historyLog.appendChild(p);
            });
        }

        // ----- SPIN LOGIC -----
        function spin() {
            // 1. Get bet
            let bet = parseInt(betInput.value, 10);
            if (isNaN(bet) || bet < 100) {
                alert('Taruhan minimal Rp 100');
                return;
            }
            if (bet > balance) {
                alert('Saldo tidak cukup!');
                return;
            }

            // 2. Disable button, add spinning class
            spinBtn.disabled = true;
            document.querySelectorAll('.reel').forEach(r => r.classList.add('spinning'));
            resultBox.className = 'result-box';
            resultBox.textContent = 'ЁЯМА Memutar...';

            // 3. Simulate delay (animation)
            setTimeout(() => {
                // Generate random symbols
                const rand = () => symbols[Math.floor(Math.random() * symbols.length)];
                const res = [rand(), rand(), rand()];

                // Update reel display
                reel1.textContent = res[0];
                reel2.textContent = res[1];
                reel3.textContent = res[2];

                // 4. Determine win
                const isWin = (res[0] === res[1] && res[1] === res[2]);
                let winAmount = 0;
                let message = '';
                if (isWin) {
                    // multiplier: 7я╕ПтГг = x10, other = x5
                    const multiplier = (res[0] === '7я╕ПтГг') ? 10 : 5;
                    winAmount = bet * multiplier;
                    balance += winAmount;
                    message = `ЁЯОЙ JACKPOT! Menang Rp ${winAmount.toLocaleString('id-ID')}`;
                    resultBox.className = 'result-box win';
                } else {
                    balance -= bet;
                    message = `ЁЯШЮ Kalah, coba lagi`;
                    resultBox.className = 'result-box lose';
                }

                // 5. Update balance
                updateBalanceUI();

                // 6. Show result
                resultBox.textContent = message;

                // 7. Save history
                const entry = {
                    symbols: res.join(' '),
                    bet: bet,
                    win: winAmount,
                };
                addHistory(entry);

                // 8. Re-enable button, remove spin class
                spinBtn.disabled = false;
                document.querySelectorAll('.reel').forEach(r => r.classList.remove('spinning'));

                // 9. Auto-check if balance zero
                if (balance < 100) {
                    setTimeout(() => {
                        alert('Saldo habis! Tekan OK untuk reset ke Rp 100.000');
                        balance = 100000;
                        updateBalanceUI();
                        history = [];
                        addHistory([]);
                        resultBox.className = 'result-box';
                        resultBox.textContent = 'ЁЯФД Saldo di-reset!';
                    }, 200);
                }
            }, 800); // spin duration
        }

        // ----- BIND EVENT -----
        spinBtn.addEventListener('click', spin);

        // Also allow Enter key on input
        betInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') spin();
        });

        // Initialize UI
        updateBalanceUI();
        addHistory([]);
        resultBox.textContent = 'ЁЯО▓ Putar untuk mulai';

        // ----- (Opsional) tombol reset via console -----
        console.log('ЁЯО░ Demo Slot siap! Ketik resetGame() di console untuk reset saldo dan history.');
        window.resetGame = function() {
            balance = 100000;
            updateBalanceUI();
            history = [];
            addHistory([]);
            resultBox.className = 'result-box';
            resultBox.textContent = 'ЁЯФД Di-reset!';
        };
    })();
</script>
</body>
  </html>
